name = "wildphotography-new"
main = ".open-next/worker.js"
compatibility_date = "2026-03-07"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[vars]
NEXTJS_ENV = "production"
PAYPAL_BUSINESS_EMAIL = "cash@pobox.com"
PAYPAL_PROFILE_LINK = "paypal.me/joshuatenbrink"
WILDPHOTO_ADMIN_EMAIL = "cash@pobox.com"
SITE_URL = "https://wildphotography.com"
NEXT_PUBLIC_SITE_URL = "https://wildphotography.com"
GOOGLE_SHEET_ID = "1_l6ul1ze4O6JQCke3TH14r8TqxgzuArN09o4wjxS4Z4"
GOOGLE_SHEET_TAB = "Orders"
RESEND_FROM_EMAIL = "orders@wildphotography.com"

[Observability]
enabled = true

[[r2_buckets]]
binding = "PHOTOS_R2"
bucket_name = "wildphoto-storage"

[[queues.producers]]
binding = "DOQueue"
queue = "do-queue"
