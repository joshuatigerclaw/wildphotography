name = "wildphotography-web"
main = "src/worker.ts"
compatibility_date = "2026-03-07"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
APP_ENV = "production"
SITE_URL = "https://wildphotography.com"

[[r2_buckets]]
binding = "PHOTO_BUCKET"
bucket_name = "wildphoto-storage"

[[queues.producers]]
binding = "SMUGMUG_METADATA"
queue = "smugmug-metadata"

[[queues.producers]]
binding = "SMUGMUG_DOWNLOAD"
queue = "smugmug-download"

[[queues.producers]]
binding = "TYPESENSE_INDEX"
queue = "typesense-index"

[observability]
enabled = true
