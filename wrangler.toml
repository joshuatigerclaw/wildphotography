name = "wildphotography-media"
main = "src/worker.ts"
compatibility_date = "2024-01-01"

[[r2_buckets]]
binding = "PHOTO_BUCKET"
bucket_name = "wildphoto-storage"

# Queue producers (for metadata import jobs)
[[queues.producers]]
queue = "smugmug-metadata"
binding = "SMUGMUG_METADATA"

[[queues.producers]]
queue = "smugmug-download"
binding = "SMUGMUG_DOWNLOAD"

[[queues.producers]]
queue = "typesense-index"
binding = "TYPESENSE_INDEX"

# Queue consumers (for background processing)
[[queues.consumers]]
queue = "smugmug-metadata"
max_batch_size = 25
max_batch_timeout = 3

[[queues.consumers]]
queue = "smugmug-download"
max_batch_size = 10
max_batch_timeout = 2

[[queues.consumers]]
queue = "typesense-index"
max_batch_size = 100
max_batch_timeout = 5
