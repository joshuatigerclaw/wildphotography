name = "wildphotography-web"
main = "src/worker.ts"
compatibility_date = "2026-03-07"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
APP_ENV = "production"
SITE_URL = "https://wildphotography.com"
MEDIA_BASE_URL = "https://media.wildphotography.com"

[[r2_buckets]]
binding = "PHOTO_BUCKET"
bucket_name = "wildphoto-storage"

[[queues.producers]]
binding = "SMUGMUG_METADATA"
queue = "smugmug-metadata"

[[queues.producers]]
binding = "SMUGMUG_DOWNLOAD"
queue = "smugmug-download"

[[queues.producers]]
binding = "TYPESENSE_INDEX"
queue = "typesense-index"

[[queues.consumers]]
binding = "SMUGMUG_METADATA"
queue = "smugmug-metadata"
max_batch_size = 10
max_wait_ms = 5000

[[queues.consumers]]
binding = "SMUGMUG_DOWNLOAD"
queue = "smugmug-download"
max_batch_size = 5
max_wait_ms = 10000

[[queues.consumers]]
binding = "TYPESENSE_INDEX"
queue = "typesense-index"
max_batch_size = 20
max_wait_ms = 5000

[observability]
enabled = true
